<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Média - Estudante de TI RutieleES</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <h1>Cálculo de Notas</h1>
        <p>Digite as três notas abaixo:</p>

        <form id="formMedia">
            <div class="campo">
                <label>Nota 1:</label>
                <input type="number" id="n1" step="0.1" min="0" max="10" required>
            </div>

            <div class="campo">
                <label>Nota 2:</label>
                <input type="number" id="n2" step="0.1" min="0" max="10" required>
            </div>

            <div class="campo">
                <label>Nota 3:</label>
                <input type="number" id="n3" step="0.1" min="0" max="10" required>
            </div>

            <button type="submit">Calcular Média</button>
        </form>

        <div id="resultado" class="hidden">
            <p>A média do aluno é: <strong id="valorMedia"></strong></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
